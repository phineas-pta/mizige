name: deploy github page

on:
  push:
    branches: ["main"]
    paths-ignore:
      - .gitignore
      - .gitlab-ci.yml
      - LICENSE
      - README.md

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6 # don’t use cache coz ignore package-lock.json
        with:
          node-version: "latest"
      - name: Install dependencies & build # don’t use `npm ci` coz ignore package-lock.json
        run: |
          npm install
          npm run build
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
